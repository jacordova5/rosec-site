<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ROSEC — Roses from Ecuador, direct to North American trade</title>
<meta name="description" content="Premium wholesale roses from Ecuador's high-altitude farms, direct to florists, wedding designers and wholesalers across North America. Launching 2026." />
<link rel="canonical" href="https://rosec.ca" />

<!-- Open Graph -->
<meta property="og:title" content="ROSEC — Roses from Ecuador, direct to North American trade" />
<meta property="og:description" content="Premium wholesale roses from Ecuador's high-altitude farms, direct to florists, wedding designers and wholesalers across North America. Launching 2026." />
<meta property="og:image" content="https://rosec.ca/assets/rose-bloom-poster.png" />
<meta property="og:url" content="https://rosec.ca" />
<meta property="og:type" content="website" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="ROSEC — Roses from Ecuador, direct to North American trade" />
<meta name="twitter:description" content="Premium wholesale roses from Ecuador's high-altitude farms, direct to florists, wedding designers and wholesalers across North America. Launching 2026." />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root{
    --ink:#0A0A0A;
    --ivory:#F5F0E6;
    --oxblood:#7A2E2E;
  }
  *,*::before,*::after{ box-sizing:border-box }
  html,body{ margin:0; padding:0; height:100%; min-height:100% }
  body{
    font-family:'Montserrat', system-ui, -apple-system, sans-serif;
    background:var(--ink);
    color:var(--ivory);
    font-weight:400;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow:hidden;
  }
  @media (max-width:640px){ body{ overflow-y:auto } }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    min-height:100dvh;
    overflow:hidden;
    background:var(--ink);
  }
  @media (max-width:640px){ .stage{ height:auto; min-height:100dvh } }

  .bg-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
    pointer-events:none;
  }
  .bg-poster{
    position:absolute; inset:0;
    background-image:url('assets/rose-bloom-poster.png');
    background-size:cover;
    background-position:center;
    z-index:0;
  }
  .bg-overlay{
    position:absolute; inset:0;
    background:rgba(10,10,10,0.40);
    z-index:1;
    pointer-events:none;
  }
  @media (prefers-reduced-motion: reduce){
    .bg-video{ display:none }
  }

  .content{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 24px 96px;
    text-align:center;
  }
  .panel{
    width:100%;
    max-width:540px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .emblem{
    height:48px;
    color:var(--ivory);
    margin-bottom:28px;
  }
  .emblem svg{ height:100%; width:auto; display:block; fill:currentColor }

  .wordmark{
    font-weight:500;
    font-size:32px;
    letter-spacing:0.25em;
    color:var(--ivory);
    margin:0;
    line-height:1;
    padding-left:0.25em;
  }
  .tagline{
    margin-top:14px;
    font-weight:400;
    font-size:11px;
    letter-spacing:0.30em;
    text-transform:uppercase;
    color:rgba(245,240,230,0.70);
    padding-left:0.30em;
  }
  .headline{
    margin:48px 0 0;
    font-weight:300;
    font-size:clamp(20px, 2.2vw, 24px);
    line-height:1.4;
    color:var(--ivory);
    max-width:420px;
    text-wrap:pretty;
  }
  .subhead{
    margin-top:20px;
    font-weight:400;
    font-size:12px;
    letter-spacing:0.20em;
    text-transform:uppercase;
    color:rgba(245,240,230,0.60);
    padding-left:0.20em;
  }

  .form-wrap{
    margin-top:32px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  .form{
    display:flex;
    flex-direction:row;
    width:100%;
    max-width:460px;
  }
  .form__field{
    flex:1;
    min-width:0;
    background:transparent;
    border:0.5px solid rgba(245,240,230,0.30);
    border-right:none;
    color:var(--ivory);
    font-family:inherit;
    font-size:14px;
    font-weight:400;
    padding:12px 16px;
    border-radius:0;
    outline:none;
    transition:border-color .2s ease;
  }
  .form__field::placeholder{
    color:rgba(245,240,230,0.40);
    font-family:inherit;
  }
  .form__field:focus{
    border-color:var(--oxblood);
    box-shadow:inset 0 0 0 0.5px var(--oxblood);
  }
  .form__btn{
    background:transparent;
    border:1px solid var(--oxblood);
    color:var(--ivory);
    font-family:inherit;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.18em;
    text-transform:uppercase;
    padding:12px 22px;
    cursor:pointer;
    transition:background .2s ease;
    white-space:nowrap;
  }
  .form__btn:hover,
  .form__btn:focus{ background:var(--oxblood); outline:none }
  .form__btn:focus-visible{ outline:1px solid var(--ivory); outline-offset:2px }

  .hp{
    position:absolute !important;
    width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
  .qualifier{
    font-weight:400;
    font-size:11px;
    color:rgba(245,240,230,0.50);
    margin:0;
    line-height:1.5;
    max-width:46ch;
  }
  .form-error{
    color:#e8b9b9;
    font-size:11px;
    letter-spacing:0.04em;
    min-height:14px;
    margin:0;
  }
  .thanks{
    font-weight:400;
    font-size:13px;
    letter-spacing:0.04em;
    color:var(--ivory);
    margin:0;
    padding:12px 0;
  }

  .foot{
    position:absolute;
    left:0; right:0;
    bottom:32px;
    z-index:3;
    text-align:center;
    pointer-events:none;
  }
  .foot a{ pointer-events:auto; color:inherit; text-decoration:none }
  .foot a:hover{ color:var(--ivory) }
  .foot__line{
    font-weight:400;
    font-size:10px;
    letter-spacing:0.20em;
    text-transform:uppercase;
    color:rgba(245,240,230,0.50);
    margin:0;
  }
  .foot__copy{
    margin-top:8px;
    color:rgba(245,240,230,0.40);
  }

  @media (max-width:640px){
    .content{ min-height:100dvh; padding:64px 20px 140px }
    .wordmark{ font-size:26px }
    .form{ flex-direction:column; max-width:340px }
    .form__field{
      border-right:0.5px solid rgba(245,240,230,0.30);
      border-bottom:none;
    }
    .form__btn{ padding:14px 22px }
    .foot{ bottom:24px }
  }
  @media (max-width:380px){
    .wordmark{ font-size:24px; letter-spacing:0.22em }
    .headline{ font-size:18px }
  }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible{
    outline:1px solid var(--oxblood);
    outline-offset:2px;
  }
</style>
</head>
<body>

<main class="stage" id="top" data-screen-label="01 Pre-launch">

    Assets shipped in /assets/:
      • rose-bloom.mp4         (~3 MB, H.264, looping rose-bloom timelapse)
      • rose-bloom-poster.png  (poster fallback, 652×502)
    Autoplay requires muted + playsinline on iOS Safari.
    The inline script HEAD-checks both URLs and degrades silently to ink.
  -->

  <video class="bg-video" autoplay loop muted playsinline preload="metadata"
         aria-hidden="true" data-src="assets/rose-bloom.mp4"
         data-poster="assets/rose-bloom-poster.png"></video>
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="content">
    <div class="panel">

        Inline SVG below uses path data from bird-path.txt. Replace with the
        final brand mark by either updating the path here or loading

        <svg viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROSEC hummingbird emblem">

      </div>

      <h1 class="wordmark">ROSEC</h1>
      <p class="tagline">Roses from Ecuador</p>

      <p class="headline">
        Premium roses from Ecuador.<br/>
        Direct to North American trade.
      </p>
      <p class="subhead">Launching 2026</p>

      <div class="form-wrap" id="form-wrap">
        <form class="form" id="signup" action="https://script.google.com/a/macros/rosec.ca/s/AKfycbzHua9TO9g_8oVqNCgOwNdUAyTFqdmC0rfcecIG7t7udRnh_H1bBXuVWVw7l7KuC38B/exec" method="POST" novalidate>
          <label class="hp" for="company">Company (leave blank)</label>
          <input class="hp" type="text" id="company" name="company" tabindex="-1" autocomplete="off" />

          <input class="form__field"
                 type="email"
                 id="email"
                 name="email"
                 placeholder="Email address"
                 aria-label="Email address"
                 autocomplete="email"
                 required />
          <button class="form__btn" type="submit" aria-label="Request access">Request access</button>
        </form>
        <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>
        <p class="qualifier">For florists, designers, and wholesalers. We&rsquo;ll write personally.</p>
        <p class="qualifier">By submitting your email you agree to receive launch updates from ROSEC.</p>
      </div>

    </div>
  </div>

  <footer class="foot">
    <p class="foot__line">Vancouver, BC</p>
    <p class="foot__line foot__copy">© 2026 ROSEC</p>
  </footer>

</main>

<script>
  (function(){
    var form    = document.getElementById('signup');
    var wrap    = document.getElementById('form-wrap');
    var emailEl = document.getElementById('email');
    var hp      = document.getElementById('company');
    var errEl   = document.getElementById('form-error');
    if (!form) return;

    var EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function setError(msg){ errEl.textContent = msg || ''; }
    function showThanks(){
      wrap.innerHTML = '<p class="thanks">Thank you. We&rsquo;ll be in touch shortly.</p>';
    }

    form.addEventListener('submit', function(e){
      e.preventDefault();
      setError('');
      if (hp && hp.value) { showThanks(); return; }

      var email = (emailEl.value || '').trim();
      if (!EMAIL_RX.test(email)) {
        setError('Please enter a valid email address.');
        emailEl.focus();
        return;
      }

      var data = new FormData(form);
      var btn = form.querySelector('.form__btn');
      var original = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Sending…';

      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(function(res){
        if (res.ok) { showThanks(); }
        else {
          return res.json().then(function(json){
            var msg = (json && json.errors && json.errors[0] && json.errors[0].message)
                      || 'Something went wrong. Please try again.';
            setError(msg);
            btn.disabled = false;
            btn.textContent = original;
          });
        }
      }).catch(function(){
        setError('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = original;
      });
    });
  })();

  // Attach video + poster only if the assets exist (avoids 404 noise pre-deploy).
  (function(){
    var v = document.querySelector('.bg-video');
    var bgPoster = document.querySelector('.bg-poster');
    if (!v) return;
    var posterUrl = v.getAttribute('data-poster');
    var srcUrl    = v.getAttribute('data-src');

    function head(url){
      return fetch(url, { method: 'HEAD' }).then(function(r){ return r.ok; }).catch(function(){ return false; });
    }

    head(posterUrl).then(function(ok){
      if (ok) {
        v.setAttribute('poster', posterUrl);
        if (bgPoster) bgPoster.style.backgroundImage = 'url(' + posterUrl + ')';
      } else if (bgPoster) {
        bgPoster.style.backgroundImage = 'none';
      }
    });

    head(srcUrl).then(function(ok){
      if (!ok) return; // leave video empty; ink-black background covers
      var s = document.createElement('source');
      s.src = srcUrl;
      s.type = 'video/mp4';
      v.appendChild(s);
      v.load();
      v.muted = true;
      var p = v.play();
      if (p && typeof p.catch === 'function') p.catch(function(){});
    });
  })();
</script>
